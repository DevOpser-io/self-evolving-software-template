AWSTemplateFormatVersion: "2010-09-09"
Description: >
  DevOpser template - single-tenant deploy to AWS Elastic Beanstalk
  (Docker single-container) with RDS PostgreSQL, ElastiCache Redis,
  and AWS Secrets Manager for DB credentials.

Parameters:
  AppName:
    Type: String
    Default: devopser-demo
    Description: >
      Base name used for the EB application, ECR repo, Secrets Manager
      prefix, and stack-wide resource names. Must be DNS-safe.
    AllowedPattern: "^[a-z][a-z0-9-]{2,30}$"

  DBPasswordParam:
    Type: String
    NoEcho: true
    MinLength: 16
    MaxLength: 128
    Description: RDS master password. Generated by deploy.sh; never hand-typed.

  SessionSecretParam:
    Type: String
    NoEcho: true
    MinLength: 32
    MaxLength: 256
    Description: Express session signing secret. Generated by deploy.sh.

  CreateEBEnvironment:
    Type: String
    AllowedValues: [ "false", "true" ]
    Default: "false"
    Description: >
      Phase gate. First deploy.sh run sets this to false so the ECR repo
      exists before EB tries to pull. Second run flips it to true.

  ImageTag:
    Type: String
    Default: latest
    Description: ECR tag the EB environment should pull.

  SourceBundleBucket:
    Type: String
    Default: ""
    Description: >
      S3 bucket where deploy.sh uploaded the Dockerrun.aws.json bundle.
      Only required when CreateEBEnvironment=true.

  SourceBundleKey:
    Type: String
    Default: ""
    Description: >
      S3 key (within SourceBundleBucket) of the bundle ZIP.
      Only required when CreateEBEnvironment=true.

  VersionLabel:
    Type: String
    Default: ""
    Description: >
      EB application version label. deploy.sh sets this to the git SHA
      or a timestamp so repeat deploys create distinct versions.

  EBSolutionStack:
    Type: String
    Default: "64bit Amazon Linux 2023 v4.12.1 running Docker"
    Description: >
      EB platform version. `aws elasticbeanstalk list-available-solution-stacks`
      lists current names if this becomes stale.

Conditions:
  WithEBEnv: !Equals [ !Ref CreateEBEnvironment, "true" ]

Mappings:
  Subnets:
    PublicA:  { Cidr: "10.60.0.0/24",  Az: "us-east-1a" }
    PublicB:  { Cidr: "10.60.1.0/24",  Az: "us-east-1b" }
    PrivateA: { Cidr: "10.60.10.0/24", Az: "us-east-1a" }
    PrivateB: { Cidr: "10.60.11.0/24", Az: "us-east-1b" }

Resources:

  # ---------- VPC ----------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.60.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [ { Key: Name, Value: !Sub "${AppName}-vpc" } ]

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [ { Key: Name, Value: !Sub "${AppName}-igw" } ]

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${AppName}-public-rt" } ]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !FindInMap [ Subnets, PublicA, Cidr ]
      AvailabilityZone: !FindInMap [ Subnets, PublicA, Az ]
      MapPublicIpOnLaunch: true
      Tags: [ { Key: Name, Value: !Sub "${AppName}-public-a" } ]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !FindInMap [ Subnets, PublicB, Cidr ]
      AvailabilityZone: !FindInMap [ Subnets, PublicB, Az ]
      MapPublicIpOnLaunch: true
      Tags: [ { Key: Name, Value: !Sub "${AppName}-public-b" } ]

  PublicSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRouteTable }

  PublicSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRouteTable }

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [ { Key: Name, Value: !Sub "${AppName}-private-rt" } ]

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !FindInMap [ Subnets, PrivateA, Cidr ]
      AvailabilityZone: !FindInMap [ Subnets, PrivateA, Az ]
      Tags: [ { Key: Name, Value: !Sub "${AppName}-private-a" } ]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !FindInMap [ Subnets, PrivateB, Cidr ]
      AvailabilityZone: !FindInMap [ Subnets, PrivateB, Az ]
      Tags: [ { Key: Name, Value: !Sub "${AppName}-private-b" } ]

  PrivateSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetA, RouteTableId: !Ref PrivateRouteTable }

  PrivateSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PrivateSubnetB, RouteTableId: !Ref PrivateRouteTable }

  # ---------- Security groups ----------
  SgApp:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: EB EC2 instance
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80,   ToPort: 80,   CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 8000, ToPort: 8000, CidrIp: 0.0.0.0/0 }
      Tags: [ { Key: Name, Value: !Sub "${AppName}-sg-app" } ]

  SgDb:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: RDS PostgreSQL - only EB can reach it
      Tags: [ { Key: Name, Value: !Sub "${AppName}-sg-db" } ]

  SgDbFromApp:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SgDb
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref SgApp

  SgRedis:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: ElastiCache Redis - only EB can reach it
      Tags: [ { Key: Name, Value: !Sub "${AppName}-sg-redis" } ]

  SgRedisFromApp:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref SgRedis
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref SgApp

  # ---------- RDS ----------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${AppName} RDS subnet group"
      SubnetIds: [ !Ref PrivateSubnetA, !Ref PrivateSubnetB ]

  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${AppName}-db"
      Engine: postgres
      EngineVersion: "16.13"
      DBInstanceClass: db.t4g.micro
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: devopser
      MasterUserPassword: !Ref DBPasswordParam
      DBName: devopser
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [ !Ref SgDb ]
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      DeletionProtection: false
      MultiAZ: false

  # ---------- ElastiCache Redis ----------
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: !Sub "${AppName} Redis subnet group"
      SubnetIds: [ !Ref PrivateSubnetA, !Ref PrivateSubnetB ]

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub "${AppName}-redis"
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: cache.t4g.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds: [ !Ref SgRedis ]

  # ---------- Secrets Manager (five entries for the *_SECRET_NAME pattern) ----------
  # The template's backend/migrate.sh and config/database.js look up each of
  # DB name / user / password / host / port as a separate secret.
  SecretDbName:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db/name"
      SecretString: devopser

  SecretDbUser:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db/user"
      SecretString: devopser

  SecretDbPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db/password"
      SecretString: !Ref DBPasswordParam

  SecretDbHost:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db/host"
      SecretString: !GetAtt Database.Endpoint.Address

  SecretDbPort:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AppName}/db/port"
      SecretString: !GetAtt Database.Endpoint.Port

  # ---------- ECR ----------
  EcrRepo:
    Type: AWS::ECR::Repository
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      RepositoryName: !Ref AppName
      EmptyOnDelete: true
      ImageScanningConfiguration: { ScanOnPush: true }

  # ---------- IAM: EB EC2 instance profile ----------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-eb-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkMulticontainerDocker
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
      Policies:
        - PolicyName: bedrock-invoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:Converse
                  - bedrock:ConverseStream
                Resource:
                  - !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/*"
                  - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/*"
        - PolicyName: secrets-scoped
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource:
                  - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppName}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AppName}-eb-instance-profile"
      Roles: [ !Ref InstanceRole ]

  ServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-eb-service-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: elasticbeanstalk.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSElasticBeanstalkEnhancedHealth
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkManagedUpdatesCustomerRolePolicy

  # ---------- Elastic Beanstalk ----------
  EbApp:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: !Ref AppName
      Description: DevOpser template single-tenant deploy

  EbAppVersion:
    Type: AWS::ElasticBeanstalk::ApplicationVersion
    Condition: WithEBEnv
    Properties:
      ApplicationName: !Ref EbApp
      Description: !Sub "Version ${VersionLabel}"
      SourceBundle:
        S3Bucket: !Ref SourceBundleBucket
        S3Key: !Ref SourceBundleKey

  EbEnv:
    Type: AWS::ElasticBeanstalk::Environment
    Condition: WithEBEnv
    DependsOn:
      - SecretDbName
      - SecretDbUser
      - SecretDbPassword
      - SecretDbHost
      - SecretDbPort
      - RedisCluster
    Properties:
      ApplicationName: !Ref EbApp
      EnvironmentName: !Sub "${AppName}-env"
      SolutionStackName: !Ref EBSolutionStack
      VersionLabel: !Ref EbAppVersion
      OptionSettings:
        # Networking
        - { Namespace: "aws:ec2:vpc", OptionName: VPCId,                    Value: !Ref Vpc }
        - { Namespace: "aws:ec2:vpc", OptionName: Subnets,                  Value: !Sub "${PublicSubnetA},${PublicSubnetB}" }
        - { Namespace: "aws:ec2:vpc", OptionName: AssociatePublicIpAddress, Value: "true" }

        # Environment type
        - { Namespace: "aws:elasticbeanstalk:environment", OptionName: EnvironmentType, Value: SingleInstance }
        - { Namespace: "aws:elasticbeanstalk:environment", OptionName: ServiceRole,     Value: !GetAtt ServiceRole.Arn }

        # Instance
        - { Namespace: "aws:autoscaling:launchconfiguration", OptionName: IamInstanceProfile, Value: !Ref InstanceProfile }
        - { Namespace: "aws:autoscaling:launchconfiguration", OptionName: InstanceType,       Value: t3.small }
        - { Namespace: "aws:autoscaling:launchconfiguration", OptionName: SecurityGroups,     Value: !Ref SgApp }

        # Container image reference (EB pulls from ECR via Dockerrun.aws.json,
        # but PORT still needs exposing at the platform level).
        - { Namespace: "aws:elasticbeanstalk:environment:proxy", OptionName: ProxyServer, Value: nginx }

        # App environment variables - the full NODE_ENV=production contract
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: NODE_ENV,                 Value: production }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: KUBERNETES_SERVICE_HOST,  Value: "1" }  # workaround for backend/config/database.js:14
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: REGION,                   Value: !Ref AWS::Region }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: HOST,                     Value: "0.0.0.0" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: PORT,                     Value: "8000" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: LLM_PROVIDER,             Value: bedrock }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_NAME_SECRET_NAME,      Value: !Sub "${AppName}/db/name" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_USER_SECRET_NAME,      Value: !Sub "${AppName}/db/user" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_PASSWORD_SECRET_NAME,  Value: !Sub "${AppName}/db/password" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_HOST_SECRET_NAME,      Value: !Sub "${AppName}/db/host" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_PORT_SECRET_NAME,      Value: !Sub "${AppName}/db/port" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: DB_REQUIRE_SSL,           Value: "true" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: REDIS_URL,                Value: !Sub "redis://${RedisCluster.RedisEndpoint.Address}:${RedisCluster.RedisEndpoint.Port}" }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: SESSION_SECRET,           Value: !Ref SessionSecretParam }
        - { Namespace: "aws:elasticbeanstalk:application:environment", OptionName: USE_SES,                  Value: "false" }

        # Enhanced health reporting
        - { Namespace: "aws:elasticbeanstalk:healthreporting:system", OptionName: SystemType, Value: enhanced }

        # Log streaming to CloudWatch
        - { Namespace: "aws:elasticbeanstalk:cloudwatch:logs", OptionName: StreamLogs, Value: "true" }
        - { Namespace: "aws:elasticbeanstalk:cloudwatch:logs", OptionName: RetentionInDays, Value: "14" }

Outputs:
  AppName:
    Value: !Ref AppName
    Export: { Name: !Sub "${AWS::StackName}-AppName" }
  EcrRepoUri:
    Value: !GetAtt EcrRepo.RepositoryUri
    Export: { Name: !Sub "${AWS::StackName}-EcrRepoUri" }
  RdsEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  RedisEndpoint:
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
  EbEnvironmentURL:
    Condition: WithEBEnv
    Value: !Sub "http://${EbEnv.EndpointURL}"
    Description: Hit this with curl for the verification gate
